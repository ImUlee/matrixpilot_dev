version: "3.8"

services:
  matrixpilotdev:
    image: leeone/matrixpilotdev:latest
    container_name: matrixpilotdev
    restart: unless-stopped
    network_mode: bridge
    ports:
      - "6600:5000"
    env_file:
      - .env
    volumes:
      - ./db:/app/db
      - ./logs:/app/logs
      - ./files:/app/file
    environment:
      - TZ=Asia/Shanghai
    healthcheck:
      test: ["CMD", "python", "-c", "import requests; requests.get('http://localhost:5000/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  matrixpilot_db:
  matrixpilot_logs:
  matrixpilot_files:
